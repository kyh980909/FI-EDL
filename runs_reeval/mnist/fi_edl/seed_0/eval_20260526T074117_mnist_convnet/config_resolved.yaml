seed: 0
checkpoint: runs/mnist/fi_edl/seed_0/train_20260514T141520_mnist_convnet/checkpoints/best.ckpt
model:
  head: edl
  num_classes: 10
  pretrained: false
  evidence_fn: softplus
  backbone_spectral_norm: false
  head_num_layers: 1
  head_hidden_dim: 256
  backbone: convnet
score:
  name: vacuity
eval:
  scores:
  - maxp
  - alpha0
  - vacuity
  - fisher
  confidence_scores:
  - maxp
  - maxalpha
  - alpha0
  - fisher
  calibration: none
  temperature: 1.0
optimizer:
  name: adam
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0
scheduler:
  name: none
  warmup_epochs: 0
  step_size: 30
  gamma: 0.1
trainer:
  max_epochs: 100
  accelerator: auto
  devices: 1
  precision: 32-true
  log_every_n_steps: 50
  early_stopping: false
  early_stopping_monitor: val/loss
  early_stopping_mode: min
  early_stopping_patience: 20
  deterministic: true
logging:
  local_dir: runs_reeval/mnist
  wandb:
    enabled: false
    project: fi-edl
    entity: null
    tags: []
    mode: online
    log_model: false
experiment:
  name: fi_edl
  method_variant: fi_edl
loss:
  name: fi_edl
  beta: 1.0
  gamma: 1.0
  info_type: fisher
  gate_type: exp
  detach_weight: true
  signal_norm: none
data:
  root: ./data
  id: mnist
  ood_list:
  - kmnist
  - fmnist
  batch_size: 128
  num_workers: 2
  val_from_train: false
  val_split: 0.0
  normalize: true
  image_size: 32
  grayscale_to_rgb: true
  random_crop_padding: 2
  random_rotation_degrees: 0.0
  val_use_train_transform: false
