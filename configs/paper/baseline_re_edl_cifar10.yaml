# Re-EDL matched-protocol baseline on CIFAR-10 (paper Table 5 row companion).
# Same backbone/epochs/batch/lr/seeds as the FI-EDL main run.
methods: [re_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=resnet18
  - trainer.max_epochs=100
  - data.batch_size=64
  - optimizer.lr=0.0005
