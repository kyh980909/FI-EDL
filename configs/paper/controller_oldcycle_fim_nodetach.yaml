# Controller ablation — Fisher information without stop-gradient on the weight.
# Old-cycle: VGG16+200ep+early-stop.
methods: [fi_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=vgg16
  - trainer.max_epochs=200
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/loss
  - trainer.early_stopping_mode=min
  - trainer.early_stopping_patience=20
  - eval.confidence_scores=[maxp,maxalpha]
  - logging.backend=csv
  - logging.wandb.enabled=false
  - loss.info_type=fisher
  - loss.gate_type=exp
  - loss.detach_weight=false
  - experiment.method_variant=fi_edl_fim_nodetach
