# Controller ablation — constant gate (no Fisher modulation).
# Old-cycle: VGG16+200ep+early-stop. method_variant tags separate run dirs.
methods: [fi_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=vgg16
  - trainer.max_epochs=200
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/loss
  - trainer.early_stopping_mode=min
  - trainer.early_stopping_patience=20
  - eval.confidence_scores=[maxp,maxalpha]
  - logging.backend=csv
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-OldCycle-CIFAR10
  - logging.local_dir=runs/oldcycle_cifar10
  - loss.info_type=fisher
  - loss.gate_type=constant
  - experiment.method_variant=fi_edl_constant
