# Controller ablation — alpha_0 information signal with exponential gate.
# Paired with main_cifar10; method_variant tags separate run dirs.
methods: [fi_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=resnet18
  - trainer.max_epochs=100
  - data.batch_size=64
  - optimizer.lr=0.0005
  - loss.info_type=alpha0
  - loss.gate_type=exp
  - experiment.method_variant=fi_edl_alpha0_gate
