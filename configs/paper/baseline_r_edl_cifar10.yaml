# Same-pipeline R-EDL baseline on CIFAR-10 (Chen et al., ICLR 2024).
# Matches main_cifar10 hyperparameters; only the loss differs.
methods: [r_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=resnet18
  - trainer.max_epochs=100
  - data.batch_size=64
  - optimizer.lr=0.0005
