# F-EDL CIFAR-10 baseline — matches paper settings (Appendix E.2, Table 10).
# T_max=100, StepLR(step=30, γ=0.1), lr=5e-4, batch=64, val_split=0.05, VGG-16.
# p/τ heads: L=2, H=256 (via experiment/f_edl.yaml defaults).
# Backbone + α-head spectral norm enabled (via experiment/f_edl.yaml).

methods: [f_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=vgg16
  - trainer.max_epochs=100
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - scheduler.name=steplr
  - scheduler.step_size=30
  - scheduler.gamma=0.1
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/loss
  - trainer.early_stopping_mode=min
  - trainer.early_stopping_patience=20
  - eval.confidence_scores=[maxp,maxalpha]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-CIFAR10
  - logging.local_dir=runs/cifar10
