# Gap 1 — ResNet-18 backbone for CIFAR-10, baseline methods (their published SN settings).
# DAEDL has head SN (no backbone SN), F-EDL has backbone SN per its config, Re-EDL has no SN.
# This preset uses each method's experiment-default settings.
methods: [daedl, f_edl, re_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=resnet18
  - trainer.max_epochs=200
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/acc
  - trainer.early_stopping_mode=max
  - trainer.early_stopping_patience=20
  - eval.scores=[maxp,alpha0,vacuity,fisher]
  - eval.confidence_scores=[maxp,maxalpha,alpha0,fisher]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-CIFAR10-resnet
  - logging.local_dir=runs/cifar10
