# F-EDL MNIST baseline.
# F-EDL paper uses DMNIST (not plain MNIST); closest setting is T_max=50,
# StepLR(step=20), L=1 MLP, H=64 (Appendix E.2 DMNIST row).
# Plain-MNIST here follows the same protocol for matched-pipeline usage.

methods: [f_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=mnist
  - backbone=convnet
  - trainer.max_epochs=50
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.2
  - optimizer.lr=0.0005
  - scheduler.name=steplr
  - scheduler.step_size=20
  - scheduler.gamma=0.1
  - model.head_num_layers=1
  - model.head_hidden_dim=64
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/loss
  - trainer.early_stopping_mode=min
  - trainer.early_stopping_patience=20
  - eval.confidence_scores=[maxp,maxalpha]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-MNIST
  - logging.local_dir=runs/mnist
