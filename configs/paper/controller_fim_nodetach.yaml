# Controller ablation — Fisher information without stop-gradient on the weight.
# Paired with main_cifar10; method_variant tags separate run dirs.
methods: [fi_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=resnet18
  - trainer.max_epochs=100
  - data.batch_size=64
  - optimizer.lr=0.0005
  - loss.info_type=fisher
  - loss.gate_type=exp
  - loss.detach_weight=false
  - experiment.method_variant=fi_edl_fim_nodetach
