# FI-EDL + spectral-norm backbone — CIFAR-10, 5 seeds.
# Tests SN contribution to OOD on CIFAR-10 (where score-only fix already
# put FI-EDL at #1 on SVHN @ alpha0). SN should help further and may close
# the remaining gap to Re-EDL on CIFAR-10 → CIFAR-100.
methods: [fi_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=vgg16
  - model.backbone_spectral_norm=true
  - trainer.max_epochs=200
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/acc
  - trainer.early_stopping_mode=max
  - trainer.early_stopping_patience=20
  - eval.scores=[maxp,alpha0,vacuity,fisher]
  - eval.confidence_scores=[maxp,maxalpha,alpha0,fisher]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-CIFAR10-sn
  - logging.local_dir=runs/cifar10
  - experiment.method_variant=fi_edl_sn
