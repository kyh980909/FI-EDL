# CIFAR-100-as-ID matched-protocol sweep — ResNet-18 backbone.
# F-EDL (Yoon NeurIPS 2025) Appendix E.2: "ResNet-18 for CIFAR-100" — we match
# this choice for fair comparison. DAEDL, Re-EDL also commonly use ResNet for
# CIFAR-100 in their reported settings.
# Methods: 3 strongest competitors (DAEDL, F-EDL, Re-EDL), matching the
# CIFAR-10/ResNet-18 sweep scope (Gap 1).
# 5 seeds × 3 methods = 15 train + 15 eval, ~12-18h GPU at ResNet-18.
methods: [daedl, f_edl, re_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar100
  - backbone=resnet18
  - trainer.max_epochs=200
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/acc
  - trainer.early_stopping_mode=max
  - trainer.early_stopping_patience=20
  - eval.scores=[maxp,alpha0,vacuity,fisher]
  - eval.confidence_scores=[maxp,maxalpha,alpha0,fisher]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-CIFAR100-resnet
  - logging.local_dir=runs/cifar100
