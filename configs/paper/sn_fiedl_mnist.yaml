# FI-EDL + spectral-norm backbone — MNIST, 5 seeds.
# Tests whether distance-aware features close the OOD gap (FI-EDL was 6-7th
# on MNIST→KMNIST/FMNIST vs DAEDL's 99.98 density-based dominance).
# Loss settings are gate-off baseline (signal_norm=none, kl_target_mask=false)
# so we isolate the contribution of spectral norm itself.
methods: [fi_edl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=mnist
  - backbone=convnet
  - model.backbone_spectral_norm=true
  - trainer.max_epochs=200
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.2
  - optimizer.lr=0.001
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/acc
  - trainer.early_stopping_mode=max
  - trainer.early_stopping_patience=20
  - eval.scores=[maxp,alpha0,vacuity,fisher]
  - eval.confidence_scores=[maxp,maxalpha,alpha0,fisher]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-MNIST-sn
  - logging.local_dir=runs/mnist
  - experiment.method_variant=fi_edl_sn
