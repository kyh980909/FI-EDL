# DA-EDL CIFAR-10 baseline — matches F-EDL paper evaluation protocol (Table 10).
# All baselines in F-EDL paper use: T_max=100, StepLR(step=30), lr=5e-4, VGG-16.

methods: [daedl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=vgg16
  - trainer.max_epochs=100
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.0005
  - scheduler.name=steplr
  - scheduler.step_size=30
  - scheduler.gamma=0.1
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/loss
  - trainer.early_stopping_mode=min
  - trainer.early_stopping_patience=20
  - eval.confidence_scores=[maxp,maxalpha]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-CIFAR10
  - logging.local_dir=runs/cifar10
