# DA-EDL CIFAR-10 baseline — matches official DAEDL paper settings.
# Official code: https://github.com/TaeseongYoon/DAEDL
#   lr=1e-3, ExponentialLR(γ=0.95/epoch), 100 epochs, batch=64, VGG-16.
# NOTE: F-EDL paper Table 10 evaluates DAEDL with lr=5e-4 + StepLR(step=30)
#       for matched comparison. Use comparison_all_cifar10 preset for that.

methods: [daedl]
seeds: [0, 1, 2, 3, 4]
run_eval: true
overrides:
  - dataset=cifar10
  - backbone=vgg16
  - trainer.max_epochs=100
  - data.batch_size=64
  - data.val_from_train=true
  - data.val_split=0.05
  - optimizer.lr=0.001
  - scheduler.name=exponentiallr
  - scheduler.gamma=0.95
  - trainer.precision=32-true
  - trainer.early_stopping=true
  - trainer.early_stopping_monitor=val/loss
  - trainer.early_stopping_mode=min
  - trainer.early_stopping_patience=20
  - eval.confidence_scores=[maxp,maxalpha]
  - logging.wandb.enabled=true
  - logging.wandb.project=FI-EDL-CIFAR10
  - logging.local_dir=runs/cifar10
