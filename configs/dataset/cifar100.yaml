# @package _global_
# CIFAR-100-as-ID with SVHN + CIFAR-10 + DTD as OOD.
# Standard "harder" benchmark used by DAEDL/F-EDL/R-EDL/Re-EDL.

data:
  root: ./data
  id: cifar100
  ood_list: [svhn, cifar10]
  batch_size: 128
  num_workers: 2
  val_from_train: false
  val_split: 0.0
  normalize: true
  image_size: 32
  grayscale_to_rgb: false
  random_crop_padding: 0
  random_rotation_degrees: 0.0
  val_use_train_transform: false

model:
  num_classes: 100

optimizer:
  lr: 0.001
