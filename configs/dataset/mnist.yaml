# @package _global_
# MNIST-as-ID with KMNIST + FashionMNIST as OOD.

data:
  root: ./data
  id: mnist
  ood_list: [kmnist, fmnist]
  batch_size: 128
  num_workers: 2
  val_from_train: false
  val_split: 0.0
  normalize: true
  image_size: 32
  grayscale_to_rgb: true
  random_crop_padding: 2
  random_rotation_degrees: 0.0
  val_use_train_transform: false

model:
  num_classes: 10

optimizer:
  lr: 0.001
