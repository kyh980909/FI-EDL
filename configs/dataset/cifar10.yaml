# @package _global_
# CIFAR-10-as-ID with SVHN + CIFAR-100 as OOD.

data:
  root: ./data
  id: cifar10
  ood_list: [svhn, cifar100]
  batch_size: 128
  num_workers: 2
  val_from_train: false
  val_split: 0.0
  normalize: true
  image_size: 32
  grayscale_to_rgb: false
  random_crop_padding: 0
  random_rotation_degrees: 0.0
  val_use_train_transform: false

model:
  num_classes: 10

optimizer:
  lr: 0.001
