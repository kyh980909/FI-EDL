# @package _global_
# FI-EDL (this paper): Fisher Information–gated adaptive KL weight.
#   lambda(v_info) = beta * exp(-gamma * v_info)
# where v_info = trace(I(alpha)) by default.

experiment:
  name: fi_edl
  method_variant: fi_edl

loss:
  name: fi_edl
  beta: 1.0
  gamma: 1.0
  info_type: fisher
  gate_type: exp
  detach_weight: true
